<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Goals – ExpenseTracker</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="navbar.css">
    <style>
        .page-content {
            padding: calc(var(--navbar-h) + 28px) 20px 48px;
        }

        .savings-wrap {
            max-width: 860px;
            margin: 0 auto;
        }

        /* ── Create goal form ── */
        .goal-form-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 28px 24px;
            margin-bottom: 28px;
        }

        .goal-form-card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .goal-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 14px;
            align-items: end;
        }

        .goal-form-row .form-group {
            margin-bottom: 0;
        }

        /* ── Goal cards ── */
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .goal-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 22px 20px;
            transition: box-shadow .2s;
        }

        .goal-card:hover {
            box-shadow: var(--shadow-md);
        }

        .goal-card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            font-size: .85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .goal-pct {
            font-size: .85rem;
            font-weight: 600;
            margin-top: 6px;
            color: var(--text-muted);
        }

        .goal-achieved {
            color: var(--success);
            font-weight: 700;
            font-size: .9rem;
            margin-top: 8px;
        }

        .goal-card .btn {
            margin-top: 12px;
            font-size: .85rem;
            padding: 8px 16px;
        }

        .empty-goals {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-goals .emoji {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        #goalMessage {
            margin-bottom: 12px;
        }

        @media (max-width: 540px) {
            .goal-form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="page-content">
        <div class="savings-wrap">

            <h1 class="section-title">🎯 Savings Goals</h1>

            <!-- Create Goal Form -->
            <div class="goal-form-card">
                <h2>➕ Create a New Goal</h2>
                <div id="goalMessage" class="message"></div>
                <div class="goal-form-row">
                    <div class="form-group">
                        <label for="title">Goal Title</label>
                        <input type="text" id="title" placeholder="e.g. New Laptop" required>
                    </div>
                    <div class="form-group">
                        <label for="target">Target Amount (₹)</label>
                        <input type="number" id="target" placeholder="0" min="1" required>
                    </div>
                    <button class="btn btn-primary" onclick="createGoal()">Create Goal</button>
                </div>
            </div>

            <!-- Goals List -->
            <div class="goals-grid" id="goals">
                <div class="empty-goals">
                    <div class="emoji">⏳</div>
                    <p>Loading goals…</p>
                </div>
            </div>

        </div>
    </div>

    <script src="navbar.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";

        async function createGoal() {
            const titleEl = document.getElementById("title");
            const targetEl = document.getElementById("target");
            const msgEl = document.getElementById("goalMessage");
            msgEl.className = "message";
            msgEl.textContent = "";

            if (!titleEl.value || !targetEl.value) {
                msgEl.classList.add("error");
                msgEl.textContent = "Please fill in both fields.";
                return;
            }

            try {
                const res = await fetch("http://localhost:5000/api/savings/add", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": token
                    },
                    body: JSON.stringify({
                        title: titleEl.value,
                        targetAmount: Number(targetEl.value)
                    })
                });

                if (res.ok) {
                    msgEl.classList.add("success");
                    msgEl.textContent = "✔ Goal created!";
                    titleEl.value = "";
                    targetEl.value = "";
                    loadGoals();
                } else {
                    msgEl.classList.add("error");
                    msgEl.textContent = "Failed to create goal.";
                }
            } catch {
                msgEl.classList.add("error");
                msgEl.textContent = "Network error. Try again.";
            }
        }

        async function addMoney(id) {
            const amount = prompt("Enter amount to add (₹):");
            if (!amount || isNaN(amount) || Number(amount) <= 0) return;

            try {
                await fetch(`http://localhost:5000/api/savings/add-money/${id}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": token
                    },
                    body: JSON.stringify({ amount: Number(amount) })
                });
                loadGoals();
            } catch {
                alert("Failed to add money.");
            }
        }

        async function loadGoals() {
            try {
                const res = await fetch("http://localhost:5000/api/savings", {
                    headers: { "Authorization": token }
                });
                const data = await res.json();

                const container = document.getElementById("goals");

                if (!data.length) {
                    container.innerHTML = `<div class="empty-goals">
                        <div class="emoji">🎯</div>
                        <p>No goals yet. Create one above!</p>
                    </div>`;
                    return;
                }

                container.innerHTML = "";
                data.forEach(goal => {
                    const pct = Math.min(goal.percentage, 100);
                    const color = goal.completed ? "var(--success)" : pct > 60 ? "var(--warning)" : "var(--primary)";
                    container.innerHTML += `
                    <div class="goal-card">
                        <h3>${goal.title}</h3>
                        <div class="goal-stats">
                            <span>Saved: ₹${goal.savedAmount.toLocaleString()}</span>
                            <span>Target: ₹${goal.targetAmount.toLocaleString()}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
                        </div>
                        <div class="goal-pct">${goal.percentage}% completed</div>
                        ${goal.completed
                            ? '<div class="goal-achieved">🎉 Goal Achieved!</div>'
                            : `<button class="btn btn-outline" onclick="addMoney('${goal._id}')">💰 Add Money</button>`
                        }
                    </div>`;
                });
            } catch {
                document.getElementById("goals").innerHTML =
                    '<div class="empty-goals"><div class="emoji">⚠️</div><p>Failed to load goals.</p></div>';
            }
        }

        loadGoals();
    </script>

</body>

</html>
