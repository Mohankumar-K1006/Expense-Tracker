<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – ExpenseTracker</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 60%, #cffafe 100%);
        }

        .auth-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: 560px;
        }

        .auth-panel {
            flex: 1;
            background: linear-gradient(140deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 36px;
            color: #fff;
            text-align: center;
        }

        .auth-panel .brand {
            font-size: 2.2rem;
            margin-bottom: 12px;
        }

        .auth-panel h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .auth-panel p {
            font-size: .95rem;
            opacity: .88;
            line-height: 1.7;
        }

        .auth-form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 40px;
        }

        .auth-form-panel h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .auth-form-panel .sub {
            font-size: .9rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .auth-form-panel form {
            display: flex;
            flex-direction: column;
            gap: 13px;
        }

        .auth-form-panel input {
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .auth-form-panel input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .auth-form-panel .btn {
            padding: 13px;
            font-size: 1rem;
            margin-top: 4px;
        }

        .auth-footer {
            margin-top: 18px;
            text-align: center;
            font-size: .9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .auth-panel {
                display: none;
            }

            .auth-form-panel {
                padding: 36px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">

        <div class="auth-panel">
            <div class="brand">💰</div>
            <h2>ExpenseTracker</h2>
            <p>Join thousands who manage<br>their finances smarter<br>every day.</p>
        </div>

        <div class="auth-form-panel">
            <h1>Create an account ✨</h1>
            <p class="sub">Start tracking your expenses today</p>

            <form id="registerForm">
                <input type="text" id="name" placeholder="Full name" required>
                <input type="email" id="email" placeholder="Email address" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <div id="message" class="message"></div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>

    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const msgEl = document.getElementById("message");
            msgEl.className = "message";
            msgEl.textContent = "";

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                msgEl.classList.add("error");
                msgEl.textContent = "Passwords do not match.";
                return;
            }

            const btn = this.querySelector("button[type=submit]");
            btn.disabled = true;
            btn.textContent = "Creating account…";

            try {
                const res = await fetch("http://localhost:5000/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        email: document.getElementById("email").value,
                        password
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    msgEl.classList.add("success");
                    msgEl.textContent = "Registered! Redirecting to login…";
                    setTimeout(() => window.location.href = "login.html", 1200);
                } else {
                    msgEl.classList.add("error");
                    msgEl.textContent = data.error || data.message || "Registration failed.";
                }
            } catch {
                msgEl.classList.add("error");
                msgEl.textContent = "Network error. Check your connection.";
            } finally {
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        });
    </script>

</body>

</html>
